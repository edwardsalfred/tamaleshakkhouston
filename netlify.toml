[build]
  publish = "site"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/menu"
  to = "/#menu"
  status = 301

[[redirects]]
  from = "/location"
  to = "/#truck"
  status = 301
